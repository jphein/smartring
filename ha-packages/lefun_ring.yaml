# lefun_ring HA package.
#  1) Profile helpers + an "apply" script (height/weight/age/sex -> distance/calorie accuracy).
#  2) Follow-me lighting: the room the ring is in turns its lights on; leaving turns them off.
#     Driven by sensor.smart_ring_location (nearest BLE proxy). The ring advertises freely now
#     (keepalive removed — this ring has no working accelerometer, so shake gestures can't work),
#     which is what makes real-time room tracking possible.
# Deploy to /homeassistant/packages/lefun_ring.yaml, then restart HA (or reload packages).

input_select:
  lefun_ring_sex:
    name: Ring profile — sex
    icon: mdi:human-male-height
    options:
      - male
      - female

input_number:
  lefun_ring_height:
    name: Ring profile — height
    icon: mdi:human-male-height
    min: 100
    max: 220
    step: 1
    unit_of_measurement: cm
    mode: box
  lefun_ring_weight:
    name: Ring profile — weight
    icon: mdi:weight-kilogram
    min: 30
    max: 200
    step: 1
    unit_of_measurement: kg
    mode: box
  lefun_ring_age:
    name: Ring profile — age
    icon: mdi:cake-variant
    min: 5
    max: 110
    step: 1
    mode: box

# ---------------------------------------------------------------------------------------------
# FUSED presence: per-room occupancy = mmWave radar (instant, identity-blind, holds while still)
# OR the ring's room (identity, covers radar-less rooms, slow ~5-60s). Radars that are unplugged
# read 'unavailable' -> contribute nothing; plug one in and its room upgrades to instant-on with
# no config change. Each room manages ITSELF (no cross-room reconcile), so manually-lit rooms
# elsewhere are never touched, and a manual "off" sticks until the room actually clears and
# re-occupies (lights fire only on the occupancy RISING edge).
# ---------------------------------------------------------------------------------------------
template:
  - binary_sensor:
      - name: Laundry occupancy
        unique_id: fused_occupancy_laundry
        device_class: occupancy
        state: >-
          {{ is_state('binary_sensor.laundry_radar_presence', 'on')
             or states('sensor.smart_ring_location') in ['Laundry', 'Office'] }}
      - name: Kitchen occupancy
        unique_id: fused_occupancy_kitchen
        device_class: occupancy
        state: >-
          {{ is_state('binary_sensor.kitchen_radar2_presence', 'on')
             or is_state('sensor.smart_ring_location', 'Kitchen') }}
      - name: Bedroom occupancy
        unique_id: fused_occupancy_bedroom
        device_class: occupancy
        state: >-
          {{ is_state('binary_sensor.bedroom_radar_presence', 'on')
             or is_state('sensor.smart_ring_location', 'Bedroom') }}
      - name: Lunas Room occupancy
        unique_id: fused_occupancy_luna_s_room
        device_class: occupancy
        state: "{{ is_state('sensor.smart_ring_location', 'Lunas Room') }}"
      - name: Shed occupancy
        unique_id: fused_occupancy_shed
        device_class: occupancy
        state: "{{ is_state('sensor.smart_ring_location', 'Shed') }}"

input_boolean:
  # Only light rooms when the sun is down (occupancy still tracks; just no daytime lights).
  ring_follow_dark_only:
    name: Follow-me only when dark
    icon: mdi:weather-night
  # Master switch for the whole follow-me behaviour.
  ring_follow_lights:
    name: Ring follow-me lighting
    icon: mdi:lightbulb-auto
  # Per-room opt-in — a room only follows the ring when BOTH the master and its own toggle are on.
  # (Slug must equal the HA area_id: the automation builds 'input_boolean.ring_follow_' ~ area_id.)
  ring_follow_laundry:
    name: "Follow-me · Laundry / Office"
    icon: mdi:washing-machine
  ring_follow_kitchen:
    name: "Follow-me · Kitchen"
    icon: mdi:countertop
  ring_follow_bedroom:
    name: "Follow-me · Bedroom"
    icon: mdi:bed
  ring_follow_luna_s_room:
    name: "Follow-me · Luna's Room"
    icon: mdi:teddy-bear
  ring_follow_shed:
    name: "Follow-me · Shed"
    icon: mdi:home-variant-outline

# NB: "last checked in" is provided by the integration itself as sensor.smart_ring_last_seen
# (a coordinator-stamped timestamp) — more reliable than a trigger-based template sensor here.

script:
  lefun_ring_apply_profile:
    alias: Apply Lefun ring profile
    icon: mdi:account-cog
    sequence:
      - action: lefun_ring.set_profile
        data:
          sex: "{{ states('input_select.lefun_ring_sex') }}"
          height_cm: "{{ states('input_number.lefun_ring_height') | int }}"
          weight_kg: "{{ states('input_number.lefun_ring_weight') | int }}"
          age: "{{ states('input_number.lefun_ring_age') | int }}"

  # Turn a room's "button_lights"-labelled entities on or off (same light set the iTag buttons use).
  ring_set_room_lights:
    alias: "Ring: set a room's button-lights on/off"
    mode: parallel
    max: 10
    fields:
      area:
        description: HA area_id
      turn:
        description: "'on' or 'off'"
    sequence:
      - variables:
          room_lights: >-
            {{ area_entities(area) | select('in', label_entities('button_lights')) | list }}
      - condition: template
        value_template: "{{ room_lights | count > 0 }}"
      - action: "homeassistant.turn_{{ turn }}"
        continue_on_error: true
        target:
          entity_id: "{{ room_lights }}"

automation:
  - id: fused_presence_lighting
    alias: "Presence: fused room lighting (radar + ring)"
    mode: queued
    max_exceeded: silent
    triggers:
      # Rising edge -> light the room (instant when a radar drives it).
      - trigger: state
        entity_id:
          - binary_sensor.laundry_occupancy
          - binary_sensor.kitchen_occupancy
          - binary_sensor.bedroom_occupancy
          - binary_sensor.lunas_room_occupancy
          - binary_sensor.shed_occupancy
        to: "on"
        id: occupied
      # Cleared (debounced) -> lights off. Radar rooms clear on the radar's own timeout;
      # ring-only rooms clear when the ring is seen elsewhere or goes away (~3 min cache).
      - trigger: state
        entity_id:
          - binary_sensor.laundry_occupancy
          - binary_sensor.kitchen_occupancy
          - binary_sensor.bedroom_occupancy
          - binary_sensor.lunas_room_occupancy
          - binary_sensor.shed_occupancy
        to: "off"
        for: "00:02:00"
        id: cleared
    conditions:
      - condition: state
        entity_id: input_boolean.ring_follow_lights
        state: "on"
    actions:
      - variables:
          area_map:
            binary_sensor.laundry_occupancy: laundry
            binary_sensor.kitchen_occupancy: kitchen
            binary_sensor.bedroom_occupancy: bedroom
            binary_sensor.lunas_room_occupancy: luna_s_room
            binary_sensor.shed_occupancy: shed
          area: "{{ area_map.get(trigger.entity_id) }}"
      - condition: template
        value_template: >-
          {{ area is not none
             and is_state('input_boolean.ring_follow_' ~ area, 'on') }}
      - choose:
          - conditions: "{{ trigger.id == 'occupied' }}"
            sequence:
              # Dark-only gate applies to turning ON; turning off is always allowed.
              - condition: template
                value_template: >-
                  {{ is_state('input_boolean.ring_follow_dark_only', 'off')
                     or is_state('sun.sun', 'below_horizon') }}
              - action: script.ring_set_room_lights
                data:
                  area: "{{ area }}"
                  turn: "on"
        default:
          - action: script.ring_set_room_lights
            data:
              area: "{{ area }}"
              turn: "off"
