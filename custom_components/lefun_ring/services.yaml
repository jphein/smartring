set_time:
  name: Set time
  description: Sync the ring's clock to Home Assistant's time (fixes step-day attribution).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device:
          integration: lefun_ring

find:
  name: Find ring
  description: Flash the ring's green LED to locate it (this ring has no vibration motor).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device:
          integration: lefun_ring

set_profile:
  name: Set user profile
  description: Set body metrics so distance & calories compute accurately (not from defaults).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device: { integration: lefun_ring }
    sex:
      name: Sex
      required: true
      selector:
        select: { options: [male, female] }
    height_cm:
      name: Height (cm)
      required: true
      selector: { number: { min: 50, max: 255, unit_of_measurement: cm, mode: box } }
    weight_kg:
      name: Weight (kg)
      required: true
      selector: { number: { min: 10, max: 255, unit_of_measurement: kg, mode: box } }
    age:
      name: Age
      required: true
      selector: { number: { min: 1, max: 110, mode: box } }

sync:
  name: Sync now
  description: On-demand connected read of battery + steps/activity (steps are stored on the ring).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device: { integration: lefun_ring }

set_camera_mode:
  name: Camera shake mode (arm/disarm)
  description: >
    Arm "shake for selfie" mode. While armed, shaking the hand fires a `lefun_ring_button`
    event (action=camera) you can use as a button in automations. Disarm to restore normal use.
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device: { integration: lefun_ring }
    enabled:
      name: Armed
      required: true
      selector: { boolean: }

measure_heart_rate:
  name: Measure heart rate
  description: Trigger an on-demand heart-rate measurement and update the sensor (~20s).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device:
          integration: lefun_ring

measure_spo2:
  name: Measure SpO₂
  description: Trigger an on-demand blood-oxygen measurement and update the sensor (~20s).
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device:
          integration: lefun_ring

measure_blood_pressure:
  name: Measure blood pressure (experimental)
  description: >
    Cuff-less PPG blood-pressure estimate (systolic/diastolic). Indicative only — not a
    medical measurement. Updates sensor.<ring>_bp_* attributes on the coordinator.
  fields:
    device_id:
      name: Ring
      description: Which ring (optional if only one is configured).
      selector:
        device:
          integration: lefun_ring
