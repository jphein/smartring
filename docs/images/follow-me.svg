<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 290" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <title>Follow-me lighting: the ring moves between rooms; each room's lights follow</title>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#ffd166" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ======================= room shells ======================= -->
  <!-- outer walls -->
  <rect x="18" y="38" width="684" height="212" rx="10" fill="none" stroke="#8a90a6" stroke-width="3"/>
  <!-- interior walls with door gaps -->
  <path d="M 245 38 V 150 M 245 210 V 250" stroke="#8a90a6" stroke-width="3" fill="none"/>
  <path d="M 475 38 V 150 M 475 210 V 250" stroke="#8a90a6" stroke-width="3" fill="none"/>

  <!-- room labels -->
  <text x="130" y="272" text-anchor="middle" font-size="15" fill="#8a90a6">Laundry</text>
  <text x="360" y="272" text-anchor="middle" font-size="15" fill="#8a90a6">Kitchen</text>
  <text x="590" y="272" text-anchor="middle" font-size="15" fill="#8a90a6">Luna’s Room</text>

  <!-- ================= per-room light groups (animated opacity) ================= -->
  <!-- Laundry -->
  <g>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      values="1;1;0;0;1;1" keyTimes="0;0.21;0.27;0.965;0.99;1"/>
    <rect x="21" y="41" width="221" height="206" rx="8" fill="#ffd166" opacity="0.13"/>
    <ellipse cx="130" cy="72" rx="86" ry="52" fill="url(#glow)"/>
    <path d="M 130 44 v 8" stroke="#8a90a6" stroke-width="2.5"/>
    <circle cx="130" cy="60" r="9" fill="#ffd166"/>
  </g>
  <!-- Kitchen -->
  <g>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.285;0.315;0.51;0.57;1"/>
    <rect x="248" y="41" width="224" height="206" rx="8" fill="#ffd166" opacity="0.13"/>
    <ellipse cx="360" cy="72" rx="86" ry="52" fill="url(#glow)"/>
    <path d="M 360 44 v 8" stroke="#8a90a6" stroke-width="2.5"/>
    <circle cx="360" cy="60" r="9" fill="#ffd166"/>
  </g>
  <!-- Luna's -->
  <g>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      values="0;0;1;1;0;0" keyTimes="0;0.585;0.615;0.87;0.92;1"/>
    <rect x="478" y="41" width="221" height="206" rx="8" fill="#ffd166" opacity="0.13"/>
    <ellipse cx="590" cy="72" rx="86" ry="52" fill="url(#glow)"/>
    <path d="M 590 44 v 8" stroke="#8a90a6" stroke-width="2.5"/>
    <circle cx="590" cy="60" r="9" fill="#ffd166"/>
  </g>

  <!-- off-state bulbs (always visible, under the glow versions) -->
  <g stroke="#8a90a6" stroke-width="2" fill="none" opacity="0.55">
    <circle cx="130" cy="60" r="9"/><circle cx="360" cy="60" r="9"/><circle cx="590" cy="60" r="9"/>
  </g>

  <!-- ======================= the ring ======================= -->
  <g>
    <animateTransform attributeName="transform" type="translate" dur="14s" repeatCount="indefinite"
      values="130 196;130 196;360 196;360 196;590 196;590 196;130 196;130 196"
      keyTimes="0;0.20;0.28;0.50;0.58;0.90;0.905;1"/>
    <animate attributeName="opacity" dur="14s" repeatCount="indefinite"
      values="1;1;0;0;1;1" keyTimes="0;0.86;0.90;0.96;0.985;1"/>
    <!-- BLE advert ripples -->
    <circle cx="0" cy="0" fill="none" stroke="#8b74ff" stroke-width="2">
      <animate attributeName="r" values="15;40" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" fill="none" stroke="#8b74ff" stroke-width="2">
      <animate attributeName="r" values="15;40" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <!-- the ring itself -->
    <circle cx="0" cy="0" r="13" fill="none" stroke="#8b74ff" stroke-width="7"/>
    <circle cx="0" cy="-13" r="4.5" fill="#22d3bb"/>
  </g>
</svg>
