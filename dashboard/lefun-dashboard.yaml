# Lefun Ring dashboard — reference copy of a storage-mode Lovelace dashboard.
# Shows live vitals + room tracking by nearest BLE proxy (sensor.smart_ring_location).
# Entity IDs use the "smart_ring" slug (device auto-titled "Smart Ring" from its BLE name).
title: Lefun Ring
views:
  - title: Lefun Ring
    path: ring
    icon: mdi:ring
    cards:
      - type: markdown
        content: |
          ## 💍 Lefun Smart Ring
          Live vitals and **room tracking** by nearest BLE proxy.
          _HR/SpO₂/BP read only while worn (tap the measure buttons). Blood pressure is a
          cuff-less PPG **estimate** — indicative, not a medical reading._
      - type: grid
        columns: 2
        square: false
        cards:
          # HR/SpO2 are on-demand spot readings (unknown between measurements); tiles render
          # "unknown" gracefully, whereas a gauge card breaks on a non-numeric value.
          - type: tile
            entity: sensor.smart_ring_heart_rate
            name: Heart rate
            icon: mdi:heart-pulse
            color: red
          - type: tile
            entity: sensor.smart_ring_spo2
            name: SpO₂
            icon: mdi:lungs
            color: cyan
          - type: gauge
            entity: sensor.smart_ring_battery
            name: Battery
            min: 0
            max: 100
            needle: true
            severity: { green: 50, yellow: 20, red: 0 }
          - type: tile
            entity: sensor.smart_ring_steps
            name: Steps
            icon: mdi:shoe-print
          - type: tile
            entity: sensor.smart_ring_distance
            name: Distance
          - type: tile
            entity: sensor.smart_ring_calories
            name: Calories
          - type: tile
            entity: sensor.smart_ring_location
            name: Location
            icon: mdi:map-marker
            color: blue
          - type: tile
            entity: sensor.smart_ring_sleep
            name: Sleep (last night)
            icon: mdi:sleep
          - type: tile
            entity: sensor.smart_ring_blood_pressure_systolic
            name: BP systolic
            icon: mdi:heart-plus-outline
          - type: tile
            entity: sensor.smart_ring_blood_pressure_diastolic
            name: BP diastolic
            icon: mdi:heart-minus-outline
          - type: tile
            entity: sensor.smart_ring_firmware
            name: Firmware
            icon: mdi:chip
      - type: history-graph
        title: Heart rate (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.smart_ring_heart_rate
      - type: history-graph
        title: Room over time (tracking)
        hours_to_show: 24
        entities:
          - entity: sensor.smart_ring_location
      - type: markdown
        title: Proxies hearing the ring
        content: >
          {% set p = state_attr('sensor.smart_ring_location','proxies') %}{% if p %}{%
          for name, rssi in p.items() | sort(attribute='1', reverse=true) %}- **{{
          name.split(' (')[0] }}**: {{ rssi }} dBm

          {% endfor %}{% else %}_No proxy currently hears the ring._{% endif %}
      - type: horizontal-stack
        cards:
          - type: button
            name: Measure HR
            icon: mdi:heart-pulse
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_heart_rate
              data: {}
          - type: button
            name: Measure SpO₂
            icon: mdi:lungs
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_spo2
              data: {}
          - type: button
            name: Measure BP
            icon: mdi:heart-pulse
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_blood_pressure
              data: {}
          - type: button
            name: Find ring
            icon: mdi:bell-ring
            tap_action:
              action: perform-action
              perform_action: lefun_ring.find
              data: {}
          - type: button
            name: Sync time
            icon: mdi:clock-check
            tap_action:
              action: perform-action
              perform_action: lefun_ring.set_time
              data: {}
          - type: button
            name: Sync steps
            icon: mdi:sync
            tap_action:
              action: perform-action
              perform_action: lefun_ring.sync
              data: {}
      - type: entities
        title: User profile → accurate distance & calories
        entities:
          - input_select.lefun_ring_sex
          - input_number.lefun_ring_height
          - input_number.lefun_ring_weight
          - input_number.lefun_ring_age
      - type: button
        name: Apply profile to ring
        icon: mdi:account-cog
        tap_action:
          action: perform-action
          perform_action: script.lefun_ring_apply_profile
          data: {}
