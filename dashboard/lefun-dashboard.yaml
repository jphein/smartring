# Lefun Ring dashboard — reference copy of a storage-mode Lovelace dashboard.
# Shows live vitals + room tracking by nearest BLE proxy (sensor.smart_ring_location).
# Entity IDs use the "smart_ring" slug (device auto-titled "Smart Ring" from its BLE name).
title: Lefun Ring
views:
  - title: Lefun Ring
    path: ring
    icon: mdi:ring
    cards:
      - type: markdown
        content: |
          ## 💍 Lefun Smart Ring
          Live vitals and **room tracking** by nearest BLE proxy.
          _HR/SpO₂/BP read only while worn (tap the measure buttons). Blood pressure is a
          cuff-less PPG **estimate** — indicative, not a medical reading._
      - type: entities
        title: Follow-me lighting
        icon: mdi:lightbulb-auto
        show_header_toggle: false
        entities:
          - entity: input_boolean.ring_follow_lights
            name: Follow-me lighting (master)
            icon: mdi:lightbulb-auto
          - entity: input_boolean.ring_follow_dark_only
            name: Only when dark
          - entity: sensor.smart_ring_location
            name: Ring is in
            icon: mdi:map-marker
          - entity: sensor.bermuda_ff_2a_35_a7_44_f3_area
            name: Ring is in (Bermuda)
            icon: mdi:map-marker-radius
          - entity: sensor.lefun_ring_last_seen
            name: Last checked in
            icon: mdi:clock-check-outline
          - type: section
            label: Rooms that follow (radar ⊕ ring occupancy)
          - entity: input_boolean.ring_follow_laundry
          - entity: binary_sensor.laundry_occupancy
            name: "· Laundry occupied"
          - entity: input_boolean.ring_follow_kitchen
          - entity: binary_sensor.kitchen_occupancy
            name: "· Kitchen occupied"
          - entity: input_boolean.ring_follow_bedroom
          - entity: binary_sensor.bedroom_occupancy
            name: "· Bedroom occupied"
          - entity: input_boolean.ring_follow_luna_s_room
          - entity: binary_sensor.lunas_room_occupancy
            name: "· Luna's Room occupied"
          - entity: input_boolean.ring_follow_shed
          - entity: binary_sensor.shed_occupancy
            name: "· Shed occupied"
      - type: markdown
        content: >
          _Each room lights on its **occupancy** rising edge — mmWave radar (instant, when
          plugged in) **or** the ring's room — and turns off ~2 min after the room clears.
          Rooms manage themselves: manually-lit rooms elsewhere are never touched, and a
          manual "off" sticks until the room clears and re-occupies. "Only when dark" gates
          turning on, never turning off._
      - type: grid
        columns: 2
        square: false
        cards:
          # HR/SpO2 are on-demand spot readings (unknown between measurements); tiles render
          # "unknown" gracefully, whereas a gauge card breaks on a non-numeric value.
          - type: tile
            entity: sensor.smart_ring_heart_rate
            name: Heart rate
            icon: mdi:heart-pulse
            color: red
          - type: tile
            entity: sensor.smart_ring_spo2
            name: SpO₂
            icon: mdi:lungs
            color: cyan
          - type: gauge
            entity: sensor.smart_ring_battery
            name: Battery
            min: 0
            max: 100
            needle: true
            severity: { green: 50, yellow: 20, red: 0 }
          # Steps/Distance/Calories/Sleep tiles removed — this ring has no working
          # accelerometer, so those always read 0/unknown (verified 2026-07-17).
          - type: tile
            entity: sensor.smart_ring_location
            name: Location
            icon: mdi:map-marker
            color: blue
          # The ring reports a single BP value (~systolic); there is no diastolic frame.
          - type: tile
            entity: sensor.smart_ring_blood_pressure_systolic
            name: Blood pressure
            icon: mdi:heart-plus-outline
          - type: tile
            entity: sensor.smart_ring_firmware
            name: Firmware
            icon: mdi:chip
      - type: history-graph
        title: Heart rate (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.smart_ring_heart_rate
      - type: history-graph
        title: Room over time (tracking)
        hours_to_show: 24
        entities:
          - entity: sensor.smart_ring_location
      - type: markdown
        title: Proxies hearing the ring
        content: >
          {% set p = state_attr('sensor.smart_ring_location','proxies') %}{% if p %}{%
          for name, rssi in p.items() | sort(attribute='1', reverse=true) %}- **{{
          name.split(' (')[0] }}**: {{ rssi }} dBm

          {% endfor %}{% else %}_No proxy currently hears the ring._{% endif %}
      - type: horizontal-stack
        cards:
          - type: button
            name: Measure HR
            icon: mdi:heart-pulse
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_heart_rate
              data: {}
          - type: button
            name: Measure SpO₂
            icon: mdi:lungs
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_spo2
              data: {}
          - type: button
            name: Measure BP
            icon: mdi:heart-pulse
            tap_action:
              action: perform-action
              perform_action: lefun_ring.measure_blood_pressure
              data: {}
          - type: button
            name: Find ring
            icon: mdi:bell-ring
            tap_action:
              action: perform-action
              perform_action: lefun_ring.find
              data: {}
          - type: button
            name: Sync time
            icon: mdi:clock-check
            tap_action:
              action: perform-action
              perform_action: lefun_ring.set_time
              data: {}
          - type: button
            name: Sync battery
            icon: mdi:sync
            tap_action:
              action: perform-action
              perform_action: lefun_ring.sync
              data: {}
      - type: entities
        title: User profile → accurate distance & calories
        entities:
          - input_select.lefun_ring_sex
          - input_number.lefun_ring_height
          - input_number.lefun_ring_weight
          - input_number.lefun_ring_age
      - type: button
        name: Apply profile to ring
        icon: mdi:account-cog
        tap_action:
          action: perform-action
          perform_action: script.lefun_ring_apply_profile
          data: {}
